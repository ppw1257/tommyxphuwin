let activeCategory = 'all';
let comments = allComments[activeCategory];

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let deck = shuffle(allComments[activeCategory]);
let pointer = 0;
let totalShown = 0;

function getNext() {
  if (pointer >= deck.length) {
    deck = shuffle(comments);
    pointer = 0;
  }
  return deck[pointer++];
}

function setCategory(cat) {
  activeCategory = cat;
  comments = allComments[cat];
  deck = shuffle(comments);
  pointer = 0;
  // Update button styles
  ['all','tommy','phuwin','both'].forEach(c => {
    const btn = document.getElementById('cat-' + c);
    if (!btn) return;
    if (c === cat) {
      btn.style.background = 'linear-gradient(135deg,#c8102e,#e4002b)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'transparent';
    } else {
      btn.style.background = 'rgba(255,255,255,0.06)';
      btn.style.color = 'rgba(255,255,255,0.6)';
      btn.style.borderColor = 'rgba(255,255,255,0.15)';
    }
  });
  // Reset display
  const el = document.getElementById('commentText');
  el.style.opacity = '0';
  el.style.transform = 'translateY(16px)';
  el.style.transition = 'none';
  setTimeout(() => {
    el.textContent = 'Tap the button to get a comment';
    el.style.transition = 'opacity 0.4s ease-out, transform 0.4s ease-out';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  }, 180);
}

function randomize() {
  const text = getNext();
  totalShown++;

  const el = document.getElementById('commentText');
  const counter = document.getElementById('counterDisplay');

  el.style.opacity = '0';
  el.style.transform = 'translateY(16px)';
  el.style.transition = 'none';

  setTimeout(() => {
    el.textContent = text;
    el.style.transition = 'opacity 0.4s ease-out, transform 0.4s ease-out';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    spawnConfetti();
    counter.textContent = 'Comment #' + totalShown + ' · ' + comments.length + ' in pool';
  }, 180);
}

function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#c8102e', '#ffffff', '#001f5c', '#e4002b', '#f5c842'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText =
      'left:' + (Math.random() * 100) + '%;' +
      'top:' + (Math.random() * 50) + '%;' +
      'background:' + colors[i % colors.length] + ';' +
      'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';' +
      'animation-delay:' + (Math.random() * 0.4).toFixed(2) + 's';
    container.appendChild(p);
    setTimeout(function(el){ return function(){ el.remove(); }; }(p), 1600);
  }
}

  text_color: '#ffffff',
  primary_action_color: '#c8102e',

function applyConfig(config) {
  var bg      = config.background_color     || defaultConfig.background_color;
  var surface = config.surface_color        || defaultConfig.surface_color;
  var text    = config.text_color           || defaultConfig.text_color;
  var primary = config.primary_action_color || defaultConfig.primary_action_color;
  var font    = config.font_family          || defaultConfig.font_family;
  var size    = config.font_size            || defaultConfig.font_size;
  var title   = config.main_title           || defaultConfig.main_title;
  var ba      = config.ba_name             || defaultConfig.ba_name;
  document.getElementById('app').style.background = bg;
  document.getElementById('commentBox').style.background = 'linear-gradient(135deg,' + surface + ',' + bg + ')';
  document.getElementById('mainTitle').style.color = text;
  document.getElementById('mainTitle').style.fontFamily = font + ', Playfair Display, serif';
  document.getElementById('mainTitle').innerHTML = title.replace(/\n/g, '<br>');
  document.getElementById('mainTitle').style.fontSize = (size * 1.6) + 'px';
  document.getElementById('baName').textContent = ba;
  document.getElementById('commentText').style.color = text;
  document.getElementById('commentText').style.fontSize = size + 'px';
  document.getElementById('randomBtn').style.background = 'linear-gradient(135deg,' + primary + ',' + primary + 'dd)';
  document.getElementById('subTitle').style.color = primary;
}

function copyComment() {
  const commentText = document.getElementById('commentText').textContent;
  if (!commentText || commentText === 'Tap the button to get a comment') return;

  function onSuccess() {
    const label = document.getElementById('copyLabel');
    const btn = document.getElementById('copyBtn');
    label.textContent = 'Copied!';
    btn.style.background = 'rgba(200,16,46,0.25)';
    btn.style.borderColor = 'rgba(200,16,46,0.5)';
    setTimeout(() => {
      label.textContent = 'Copy Comment';
      btn.style.background = 'rgba(255,255,255,0.08)';
      btn.style.borderColor = 'rgba(255,255,255,0.18)';
    }, 2000);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(commentText).then(onSuccess).catch(() => fallbackCopy(commentText, onSuccess));
  } else {
    fallbackCopy(commentText, onSuccess);
  }
}

function fallbackCopy(text, onSuccess) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch(e) {
    alert('Please long-press the comment text to copy manually.');
  }
  document.body.removeChild(ta);
}
